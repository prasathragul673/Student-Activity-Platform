<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centralised HEI Student Activity Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <h1>Centralised HEI Student Activity Platform</h1>
        <p class="subtitle">Smart India Hackathon Prototype</p>
    </header>

    <main class="container">
        <section class="form-card">
            <h2>Add New Activity</h2>
            
            <form id="activityForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="e.g. John Doe" required>
                </div>

                <div class="form-group">
                    <label for="regId">Registration ID</label>
                    <input type="text" id="regId" placeholder="e.g. 2026CS1002" required>
                </div>

                <div class="form-group">
                    <label for="activityTrack">Activity Track</label>
                    <select id="activityTrack" required>
                        <option value="" disabled selected>Select Track</option>
                        <option value="Technical / Hackathon">Technical / Hackathon</option>
                        <option value="Sports">Sports</option>
                        <option value="Cultural">Cultural</option>
                        <option value="Community Service">Community Service</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="eventName">Event Name</label>
                    <input type="text" id="eventName" placeholder="e.g. Smart India Hackathon" required>
                </div>

                <button type="submit" id="submitBtn">Submit Activity</button>
            </form>
        </section>
    </main>

    <!-- Standard Script: 100% bug-free deployment strategy -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const form = document.getElementById("activityForm");
            const submitBtn = document.getElementById("submitBtn");

            form.addEventListener("submit", function(event) {
                // Instantly intercept form to stop window reloads
                event.preventDefault(); 

                submitBtn.disabled = true;
                submitBtn.innerText = "Saving Data...";

                // Extract form values
                const fullName = document.getElementById("fullName").value.trim();
                const regId = document.getElementById("regId").value.trim();
                const activityTrack = document.getElementById("activityTrack").value;
                const eventName = document.getElementById("eventName").value.trim();

                const activityData = {
                    fullName: fullName,
                    regId: regId,
                    activityTrack: activityTrack,
                    eventName: eventName,
                    status: "INITIATED",
                    createdAt: new Date().toISOString()
                };

                // Directly write records via a standard HTTP background post request
                const targetEndpoint = "https://firebaseio.com";

                fetch(targetEndpoint, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(activityData)
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Server rejected entry data packet.");
                    }
                    return response.json();
                })
                .then(data => {
                    alert("🎉 SUCCESS! Activity saved directly to your cloud Firebase database panel.");
                    form.reset();
                })
                .catch(error => {
                    alert("⚠️ NETWORK BLOCK: Clear out old paths. Details: " + error.message);
                })
                .finally(() => {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Submit Activity";
                });
            });
        });
    </script>
</body>
</html>
