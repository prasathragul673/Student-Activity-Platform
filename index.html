<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centralised HEI Student Activity Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <h1>Centralised HEI Student Activity Platform</h1>
        <p class="subtitle">Smart India Hackathon Prototype</p>
    </header>

    <main class="container">
        <section class="form-card">
            <h2>Add New Activity</h2>
            
            <form id="activityForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="e.g. John Doe" required>
                </div>

                <div class="form-group">
                    <label for="regId">Registration ID</label>
                    <input type="text" id="regId" placeholder="e.g. 2026CS1002" required>
                </div>

                <div class="form-group">
                    <label for="activityTrack">Activity Track</label>
                    <select id="activityTrack" required>
                        <option value="" disabled selected>Select Track</option>
                        <option value="Technical / Hackathon">Technical / Hackathon</option>
                        <option value="Sports">Sports</option>
                        <option value="Cultural">Cultural</option>
                        <option value="Community Service">Community Service</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="eventName">Event Name</label>
                    <input type="text" id="eventName" placeholder="e.g. Smart India Hackathon" required>
                </div>

                <button type="submit" id="submitBtn">Submit Activity</button>
            </form>
        </section>
    </main>

    <!-- Embedded Inline Script Module: Bypasses file loading bugs completely -->
    <script type="module">
        // Import Firebase core libraries directly inside the page layer
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, push, set } from "https://gstatic.com";

        // Verified Firebase configuration parameters (Matches your exact console dashboard view)
        const firebaseConfig = {
            apiKey: "AIzaSyAjkizFWNr9e9xITLT0iSZBd6hUFY-5V6M",
            authDomain: "://firebaseapp.com",
            projectId: "sih-student-portal",
            storageBucket: "sih-student-portal.firebasestorage.app",
            messagingSenderId: "801559553018",
            appId: "1:801559553018:web:45fe0c1b9acb561c9b3a43",
            databaseURL: "https://firebaseio.com"
        };

        // Initialize live Firebase runtime connectivity
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Track and hook directly into DOM interactive form wrappers
        const form = document.getElementById("activityForm");
        const submitBtn = document.getElementById("submitBtn");

        if (form) {
            form.addEventListener("submit", async (event) => {
                // Hard intercept: Block standard browser page submit refreshes entirely
                event.preventDefault(); 

                // Alter visual control attributes to protect database from multi-click anomalies
                submitBtn.disabled = true;
                submitBtn.innerText = "Uploading to Cloud Backend...";

                try {
                    // Extract exact form string entries
                    const fullName = document.getElementById("fullName").value.trim();
                    const regId = document.getElementById("regId").value.trim();
                    const activityTrack = document.getElementById("activityTrack").value;
                    const eventName = document.getElementById("eventName").value.trim();

                    // Generate schema layout matching SIH guidelines
                    const activityData = {
                        fullName: fullName,
                        regId: regId,
                        activityTrack: activityTrack,
                        eventName: eventName,
                        status: "INITIATED",
                        createdAt: new Date().toISOString()
                    };

                    // Define internal directory nodes inside the database root branch
                    const rootBranchRef = ref(db, 'student_activities');
                    const freshRecordSlot = push(rootBranchRef);
                    
                    // Transmit data packet straight to cloud storage
                    await set(freshRecordSlot, activityData);
                    
                    // Throw native UI window notification popover confirming delivery
                    alert("🎉 SUCCESS! Data reached your Firebase Database tree structure safely!");
                    form.reset(); 

                } catch (error) {
                    alert("⚠️ CONNECTIVITY FAILURE: Check your database network rules block. Details: " + error.message);
                } finally {
                    // Re-engage submit controls for next operational iteration loop
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Submit Activity";
                }
            });
        } else {
            alert("Structural page layout breakdown detected.");
        }
    </script>
</body>
</html>
